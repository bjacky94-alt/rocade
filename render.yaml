services:
  - type: web
    name: rocade
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATA_DIR
        value: /var/data
    disk:
      name: rocade-data
      mountPath: /var/data
      sizeGB: 1

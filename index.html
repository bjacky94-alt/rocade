<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocade Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/dashboard.css">
</head>
<body>

    <header id="header">
        <div class="brand">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            Rocade Manager
            <span class="brand-pro">Pro</span>
        </div>

        <div class="header-stats hidden" id="headerStats">
            <div class="stat-item">
                <div class="stat-value" id="totalPorts">0</div>
                <div class="stat-label">Total Ports</div>
            </div>
            <div class="stat-item active">
                <div class="stat-value" id="activePorts">0</div>
                <div class="stat-label">Actifs</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="utilization">0%</div>
                <div class="stat-label">Utilisation</div>
            </div>
        </div>

        <div class="header-actions" id="headerActions">
            <button class="btn btn-back hidden" id="btnBack" onclick="goBack()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M19 12H5m7-7l-7 7 7 7"/>
                </svg>
                Retour
            </button>
            <button class="btn hidden" id="btnExport" onclick="exportData()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Exporter
            </button>
            <button class="btn hidden" id="btnImport" onclick="triggerImport()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Importer
            </button>
            <button class="btn" id="btnReset" onclick="resetData()" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Réinitialiser
            </button>
            <input type="file" id="fileInput" style="display: none;" accept=".json" onchange="handleFileSelect(event)">
        </div>
    </header>

    <main class="main-content" id="mainContent"></main>

    <div id="toast-container"></div>

    <script src="static/js/dashboard.js"></script>
</body>
</html>
